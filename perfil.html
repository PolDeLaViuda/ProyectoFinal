<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Perfil d'Usuari</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<div class="auth-container">

<h2 class="auth-title">Panell d'Usuari</h2>
<p class="auth-subtitle">Informació personal</p>

<div class="form-group">
<label class="form-label">Nom</label>
<input class="form-input" type="text" placeholder="Nom usuari">
</div>

<div class="form-group">
<label class="form-label">Email</label>
<input class="form-input" type="email" placeholder="Email">
</div>

<div class="form-group">
<label class="form-label">Contrasenya</label>
<input class="form-input" type="password" placeholder="Nova contrasenya">
</div>

<button class="btn btn-primary">Guardar canvis</button>

<br><br>

<button class="btn btn-logout" onclick="logout()">Tancar sessió</button>

</div>

</div>

<script>

function logout(){
    window.location.href="index.html";
}

</script>

</body>
</html>
